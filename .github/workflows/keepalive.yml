name: Streamlit Keepalive

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Playwright 설치
        run: |
          pip install playwright
          playwright install --with-deps chromium

      - name: 앱 방문해서 깨우기
        run: python scripts/keepalive.py
